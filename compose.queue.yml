# ============================================================
# Override: Queue Mode (Redis + Worker)
# ============================================================
# Activar cuando:
#   - Tengas 20+ workflows activos concurrentes
#   - Necesites que ejecuciones sobrevivan reinicios de n8n
#   - Quieras ejecutar workflows en paralelo sin bloquear el editor
#
# Uso: docker compose -f compose.yml -f compose.local.yml \
#        -f compose.queue.yml --profile queue up -d
# ============================================================

services:
  redis:
    image: redis:7-alpine
    container_name: n8n-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    networks:
      - internal
    profiles:
      - queue
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n-worker:
    image: ${N8N_IMAGE:-n8nio/n8n:latest}
    container_name: n8n-worker
    restart: unless-stopped
    command: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n_user}
      DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/postgres_password
      N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_encryption_key
      TZ: ${TZ:-America/Lima}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Lima}
    secrets:
      - postgres_password
      - n8n_encryption_key
      - redis_password
    networks:
      - internal
      - public
    dns:
      - 1.1.1.1
      - 8.8.8.8
    profiles:
      - queue
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'n8n worker' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Override de n8n para agregar conexión a Redis
  n8n:
    environment:
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}

volumes:
  redis_data:

secrets:
  redis_password:
    file: ./secrets/redis_password.txt
