# ============================================================
# n8n Server — Docker Compose Base
# ============================================================
# Este es el archivo base. Se combina con:
#   compose.local.yml   → laptop (Cloudflare Tunnel)
#   compose.vps.yml     → VPS (Caddy SSL directo)
#   compose.ai.yml      → IA local (Ollama + Qdrant)
#   compose.queue.yml   → Escalabilidad (Redis + Worker)
#
# Uso laptop:  docker compose -f compose.yml -f compose.local.yml up -d
# Uso VPS:     docker compose -f compose.yml -f compose.vps.yml up -d
# ============================================================

name: ${PROJECT_NAME:-n8n-server}

# DNS explícito — evita flakiness del resolver embebido de Docker Desktop / WSL2.
# El resolver 127.0.0.11 reenvía a Windows via bridge (192.168.65.7), path inestable.
# Con estos servidores los contenedores resuelven directamente via la red public.
x-dns: &dns-public
  dns:
    - 1.1.1.1
    - 8.8.8.8

services:

  # --- Base de Datos ---
  postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      TZ: ${TZ:-America/Lima}
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n_user} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- n8n (Motor de Workflows) ---
  n8n:
    <<: *dns-public
    image: ${N8N_IMAGE:-n8nio/n8n:latest}
    container_name: n8n-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Timezone
      TZ: ${TZ:-America/Lima}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Lima}

      # Base de datos
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n_user}
      DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/postgres_password

      # Encryption key (via archivo, no variable)
      N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_encryption_key

      # URLs
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      N8N_HOST: ${N8N_EDITOR_HOST}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_PROXY_HOPS: ${N8N_PROXY_HOPS:-1}

      # Seguridad (hardening)
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-true}
      N8N_SAMESITE_COOKIE: ${N8N_SAMESITE_COOKIE:-lax}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE:-true}
      N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES: ${N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES:-true}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: ${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS:-true}
      N8N_RESTRICT_FILE_ACCESS_TO: ${N8N_RESTRICT_FILE_ACCESS_TO:-/files}
      NODES_EXCLUDE: ${NODES_EXCLUDE}

      # Ejecuciones (pruning)
      EXECUTIONS_DATA_PRUNE: ${EXECUTIONS_DATA_PRUNE:-true}
      EXECUTIONS_DATA_MAX_AGE: ${EXECUTIONS_DATA_MAX_AGE:-336}
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: ${EXECUTIONS_DATA_PRUNE_MAX_COUNT:-10000}
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: ${EXECUTIONS_DATA_SAVE_ON_SUCCESS:-none}
      EXECUTIONS_DATA_SAVE_ON_ERROR: ${EXECUTIONS_DATA_SAVE_ON_ERROR:-all}
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: ${EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS:-true}

      # Binarios a disco
      N8N_DEFAULT_BINARY_DATA_MODE: ${N8N_DEFAULT_BINARY_DATA_MODE:-filesystem}
      N8N_BINARY_DATA_STORAGE_PATH: ${N8N_BINARY_DATA_STORAGE_PATH:-/files/binaryData}

      # Privacidad y UI
      N8N_DIAGNOSTICS_ENABLED: ${N8N_DIAGNOSTICS_ENABLED:-false}
      N8N_HIRING_BANNER_ENABLED: ${N8N_HIRING_BANNER_ENABLED:-false}
      N8N_VERSION_NOTIFICATIONS_ENABLED: ${N8N_VERSION_NOTIFICATIONS_ENABLED:-true}
      N8N_TEMPLATES_ENABLED: ${N8N_TEMPLATES_ENABLED:-true}
      N8N_PUBLIC_API_DISABLED: ${N8N_PUBLIC_API_DISABLED:-false}

      # AI Workflow Creator
      AI_CREATOR_TOKEN: ${AI_CREATOR_TOKEN}

      # Métricas
      N8N_METRICS: ${N8N_METRICS:-true}
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}
    secrets:
      - postgres_password
      - n8n_encryption_key
    volumes:
      - n8n_data:/home/node/.n8n
      - ./files:/files
    networks:
      - internal
      - public
    expose:
      - "5678"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --- Reverse Proxy ---
  caddy:
    image: caddy:2-alpine
    container_name: n8n-caddy
    restart: unless-stopped
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public
    depends_on:
      n8n:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/caddy-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# --- Redes ---
networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge

# --- Volúmenes ---
volumes:
  postgres_data:
  n8n_data:
  caddy_data:
  caddy_config:

# --- Secretos ---
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  n8n_encryption_key:
    file: ./secrets/n8n_encryption_key.txt
